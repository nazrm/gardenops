name: GardenOps CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: gardenops
          POSTGRES_PASSWORD: test
          POSTGRES_DB: gardenops_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gardenops -d gardenops_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_ENV: test
      AUTH_REQUIRED: "false"
      DATABASE_URL: postgresql://gardenops:test@127.0.0.1:5432/gardenops_test
      GARDENOPS_TEST_POSTGRES_URL: postgresql://gardenops:test@127.0.0.1:5432/gardenops_test
      GARDENOPS_LOGS_DIR: /tmp/gardenops-logs
      MEDIA_STORAGE_DIR: /tmp/gardenops-media
      RATE_LIMIT_BACKEND: memory
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - run: uv lock --check
      - run: python scripts/check_dependency_sources.py
      - run: uv run --frozen --group audit python scripts/generate_security_release_bypass.py --ecosystem python --base-ref "origin/${{ github.base_ref }}"
        if: github.event_name == 'pull_request'
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: github.event_name == 'pull_request'
        with:
          name: security-release-bypass-python
          path: .gardenops/security-release-bypass.json
          if-no-files-found: ignore
      - run: python scripts/check_python_release_age.py
      - run: uv sync --frozen --group test --group lint
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run python scripts/check_env_docs.py
      - run: uv run python -c "import gardenops.db as db; db.run_migrations()"
      - run: uv run python scripts/check_backend_integrity.py --format text
      - run: uv run pytest tests/ -q --tb=short

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        if: github.event_name == 'pull_request'
        with:
          python-version-file: .python-version
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: python scripts/generate_security_release_bypass.py --ecosystem npm --base-ref "origin/${{ github.base_ref }}"
        if: github.event_name == 'pull_request'
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: github.event_name == 'pull_request'
        with:
          name: security-release-bypass-npm
          path: .gardenops/security-release-bypass.json
          if-no-files-found: ignore
      - run: node scripts/check_npm_release_age.cjs
      - run: npm run build
        working-directory: frontend
      - run: node scripts/check_no_sourcemaps.cjs frontend/dist
