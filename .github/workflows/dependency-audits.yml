name: Dependency Audits

on:
  schedule:
    - cron: "40 6 * * 1"
  workflow_dispatch:
  pull_request:
    paths:
      - pyproject.toml
      - uv.lock
      - frontend/package.json
      - frontend/package-lock.json

permissions:
  contents: read

jobs:
  backend-audit:
    name: Backend Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv lock --check
      - run: python scripts/check_dependency_sources.py
      - run: python scripts/check_python_release_age.py
      - run: uv sync --frozen --group test
      - run: uv pip freeze | grep -v '^-e ' > /tmp/gardenops-backend-requirements.txt
      - run: python -m pip install --upgrade "pip-audit==2.9.0"
      - run: pip-audit --strict -r /tmp/gardenops-backend-requirements.txt

  frontend-audit:
    name: Frontend Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: node ../scripts/check_npm_release_age.cjs
      - run: npm audit --audit-level=high
