name: Dependency Review

on:
  pull_request:
    paths:
      - pyproject.toml
      - uv.lock
      - frontend/package.json
      - frontend/package-lock.json
      - .github/dependabot.yml
      - .github/workflows/**

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: uv lock --check
      - run: python scripts/check_dependency_sources.py
      - run: python scripts/check_python_release_age.py
      - run: uv sync --frozen --all-groups
      - run: uv pip freeze | grep -v '^-e ' > /tmp/gardenops-backend-requirements.txt
      - run: uv run --frozen --group audit pip-audit --strict -r /tmp/gardenops-backend-requirements.txt
      - run: npm ci
        working-directory: frontend
      - run: node scripts/check_npm_release_age.cjs
      - run: npm audit --audit-level=high
        working-directory: frontend
