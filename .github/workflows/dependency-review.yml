name: Dependency Review

on:
  pull_request:
    paths:
      - pyproject.toml
      - uv.lock
      - frontend/package.json
      - frontend/package-lock.json
      - .github/dependabot.yml
      - .github/workflows/**

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: uv lock --check
      - name: Prepare trusted dependency policy checkout
        run: |
          set -euo pipefail
          rm -rf /tmp/gardenops-policy-review /tmp/gardenops-pr-dependency-data
          mkdir -p /tmp/gardenops-pr-dependency-data/frontend
          cp pyproject.toml uv.lock /tmp/gardenops-pr-dependency-data/
          cp frontend/package.json frontend/package-lock.json /tmp/gardenops-pr-dependency-data/frontend/
          git fetch origin "${{ github.base_ref }}" --depth=1
          git worktree prune
          git worktree add --detach /tmp/gardenops-policy-review "origin/${{ github.base_ref }}"
          rm -rf /tmp/gardenops-policy-review/.github/workflows
          mkdir -p /tmp/gardenops-policy-review/.github
          cp -R .github/workflows /tmp/gardenops-policy-review/.github/workflows
          if [ ! -f /tmp/gardenops-policy-review/scripts/check_github_action_pins.py ]; then
            echo "Trusted base checkout is missing scripts/check_github_action_pins.py; refusing to run PR-controlled checker." >&2
            exit 1
          fi
      - run: python scripts/check_github_action_pins.py
        working-directory: /tmp/gardenops-policy-review
      - run: python scripts/check_dependency_sources.py --root /tmp/gardenops-pr-dependency-data
        working-directory: /tmp/gardenops-policy-review
      - name: Generate trusted security-release bypass evidence
        working-directory: /tmp/gardenops-policy-review
        run: |
          set -euo pipefail
          if python scripts/generate_security_release_bypass.py --help | grep -q -- "--head-root"; then
            uv run --frozen --group audit python scripts/generate_security_release_bypass.py --base-ref "origin/${{ github.base_ref }}" --head-root /tmp/gardenops-pr-dependency-data
          else
            uv run --frozen --group audit python scripts/generate_security_release_bypass.py --base-ref "origin/${{ github.base_ref }}"
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dependency-review-security-release-bypass
          path: /tmp/gardenops-policy-review/.gardenops/security-release-bypass.json
          if-no-files-found: error
      - name: Copy PR dependency data into trusted policy checkout
        run: |
          set -euo pipefail
          cp /tmp/gardenops-pr-dependency-data/pyproject.toml /tmp/gardenops-pr-dependency-data/uv.lock /tmp/gardenops-policy-review/
          cp /tmp/gardenops-pr-dependency-data/frontend/package.json /tmp/gardenops-pr-dependency-data/frontend/package-lock.json /tmp/gardenops-policy-review/frontend/
      - run: python scripts/check_python_release_age.py
        working-directory: /tmp/gardenops-policy-review
      - run: uv sync --frozen --all-groups
      - run: uv pip freeze | grep -v '^-e ' > /tmp/gardenops-backend-requirements.txt
      - run: uv run --frozen --group audit pip-audit --strict -r /tmp/gardenops-backend-requirements.txt
      - run: npm ci
        working-directory: frontend
      - run: node scripts/check_npm_release_age.cjs
        working-directory: /tmp/gardenops-policy-review
      - run: npm audit --audit-level=high
        working-directory: frontend
