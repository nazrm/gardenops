# vim:ft=nginx
#
# Production-oriented GardenOps reverse proxy template. Replace
# gardenops.example.com and TLS paths before use.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

map $request_uri $gardenops_log_uri {
    default $request_uri;
    ~^/calendar/subscriptions/[^/?]+\.ics(?:\?.*)?$ /calendar/subscriptions/[redacted].ics;
    ~^/shademap/terrain/ $uri?[redacted];
}

log_format gardenops_redacted '$remote_addr - $remote_user [$time_local] '
    '"$request_method $gardenops_log_uri $server_protocol" $status $body_bytes_sent '
    '"$http_referer" "$http_user_agent"';

limit_req_zone $binary_remote_addr zone=gardenops_auth:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=gardenops_admin_read:10m rate=12r/m;
limit_req_zone $binary_remote_addr zone=gardenops_admin_write:10m rate=6r/m;
limit_req_zone $binary_remote_addr zone=gardenops_ai:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=gardenops_upload:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=gardenops_features:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=gardenops_terrain:10m rate=8r/s;

upstream gardenops {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name gardenops.example.com;

    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html/gardenops.example.com/;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name gardenops.example.com;

    # Certificate and key paths are host-provisioned. TLS policy stays inline so
    # this template does not depend on untracked Certbot include snippets.
    ssl_certificate /etc/letsencrypt/live/gardenops.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gardenops.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:gardenops_tls:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    server_tokens off;

    add_header Referrer-Policy                   "no-referrer"       always;
    add_header X-Content-Type-Options            "nosniff"           always;
    add_header X-Permitted-Cross-Domain-Policies "none"              always;
    add_header X-Robots-Tag                      "noindex, nofollow" always;
    add_header Strict-Transport-Security         "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options                   "DENY"              always;
    add_header Permissions-Policy                "camera=(), microphone=(), geolocation=(), payment=()" always;

    access_log /var/log/nginx/gardenops-access.log gardenops_redacted;
    error_log  /var/log/nginx/gardenops-error.log error;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;

    proxy_buffering off;
    proxy_request_buffering off;
    limit_req_status 429;

    # Default body size; only upload/import/AI endpoints override below.
    client_max_body_size 1m;


    # Compress only cacheable static assets. Keep API and other dynamic proxy
    # responses uncompressed to avoid TLS compression side-channel exposure for
    # JSON responses that may include bearer-like tokens or other secrets.
    location ~* ^/(?!api/).+\.(?:css|js|mjs|svg|xml|ttf|otf|woff|woff2)$ {
        gzip on;
        gzip_vary on;
        gzip_comp_level 5;
        gzip_min_length 1024;
        gzip_proxied any;
        gzip_types
            application/javascript
            application/xml
            font/otf
            font/ttf
            font/woff
            font/woff2
            image/svg+xml
            text/css
            text/xml;

        proxy_pass http://gardenops;
    }

    # --- admin reads (burst 12) ---
    location ^~ /api/admin/                       { limit_req zone=gardenops_admin_read  burst=12 nodelay; proxy_pass http://gardenops; }
    location =  /api/auth/audit-events            { limit_req zone=gardenops_admin_read  burst=12 nodelay; proxy_pass http://gardenops; }
    location =  /api/auth/security-metrics        { limit_req zone=gardenops_admin_read  burst=12 nodelay; proxy_pass http://gardenops; }
    location =  /api/auth/security-alerts         { limit_req zone=gardenops_admin_read  burst=12 nodelay; proxy_pass http://gardenops; }
    location =  /api/auth/sessions                { limit_req zone=gardenops_admin_read  burst=12 nodelay; proxy_pass http://gardenops; }
    location ^~ /api/auth/sessions/               { limit_req zone=gardenops_admin_write burst=6  nodelay; proxy_pass http://gardenops; }
    location =  /api/plots/export                 { limit_req zone=gardenops_admin_read  burst=12 nodelay; proxy_pass http://gardenops; }
    location =  /api/media/plants/missing-covers  { limit_req zone=gardenops_admin_read  burst=12 nodelay; proxy_pass http://gardenops; }

    # --- admin writes (burst 6) ---
    location =  /api/admin/provider-settings      { limit_req zone=gardenops_admin_write burst=6  nodelay; proxy_pass http://gardenops; }
    location =  /api/snapshots                    { limit_req zone=gardenops_admin_write burst=6  nodelay; proxy_pass http://gardenops; }
    location ^~ /api/snapshots/                   { limit_req zone=gardenops_admin_write burst=6  nodelay; proxy_pass http://gardenops; }
    location ^~ /api/auth/mfa/                    { limit_req zone=gardenops_admin_write burst=6  nodelay; proxy_pass http://gardenops; }
    location =  /api/auth/users                   { limit_req zone=gardenops_admin_write burst=6  nodelay; proxy_pass http://gardenops; }
    location ^~ /api/auth/users/                  { limit_req zone=gardenops_admin_write burst=6  nodelay; proxy_pass http://gardenops; }
    location =  /api/auth/user-invitations        { limit_req zone=gardenops_admin_write burst=6  nodelay; proxy_pass http://gardenops; }
    location ^~ /api/auth/user-invitations/       { limit_req zone=gardenops_admin_write burst=6  nodelay; proxy_pass http://gardenops; }
    location =  /api/auth/revoke-user-sessions    { limit_req zone=gardenops_admin_write burst=6  nodelay; proxy_pass http://gardenops; }
    location =  /api/auth/revoke-all-sessions     { limit_req zone=gardenops_admin_write burst=6  nodelay; proxy_pass http://gardenops; }
    location =  /api/auth/emergency-read-only     { limit_req zone=gardenops_admin_write burst=6  nodelay; proxy_pass http://gardenops; }
    location =  /api/media/plants/populate-missing-covers { limit_req zone=gardenops_admin_write burst=6 nodelay; proxy_pass http://gardenops; }
    location ~ ^/api/gardens/[0-9]+(/invitations(/[0-9]+)?)?$ {
        limit_req zone=gardenops_admin_write burst=6 nodelay;
        proxy_pass http://gardenops;
    }

    # --- uploads / imports ---
    location = /api/plots/import      { client_max_body_size 8m; limit_req zone=gardenops_admin_write burst=6 nodelay; proxy_pass http://gardenops; }
    location = /api/plants/import-csv { client_max_body_size 8m; limit_req zone=gardenops_upload     burst=4 nodelay; proxy_pass http://gardenops; }
    location = /api/media/upload      { client_max_body_size 8m; limit_req zone=gardenops_upload     burst=4 nodelay; proxy_pass http://gardenops; }
    location ~ ^/api/gardens/[0-9]+/lidar$ { client_max_body_size 256m; limit_req zone=gardenops_upload burst=2 nodelay; proxy_pass http://gardenops; }

    # --- AI (exact = beats ^~ /api/ai/ catchall below) ---
    location = /api/ai/identify-plant { client_max_body_size 8m; limit_req zone=gardenops_ai burst=10 nodelay; proxy_pass http://gardenops; }
    location = /api/ai/diagnose-plant { client_max_body_size 8m; limit_req zone=gardenops_ai burst=10 nodelay; proxy_pass http://gardenops; }
    location ^~ /api/ai/              {                          limit_req zone=gardenops_ai burst=10 nodelay; proxy_pass http://gardenops; }

    # --- auth catchall (loses to all longer ^~ /api/auth/* above) ---
    location ^~ /api/auth/ { limit_req zone=gardenops_auth burst=20 nodelay; proxy_pass http://gardenops; }

    # --- shademap ---
    location =  /api/shademap/features { limit_req zone=gardenops_features burst=30  nodelay; proxy_pass http://gardenops; }
    location ^~ /shademap/terrain/     { limit_req zone=gardenops_terrain  burst=120 nodelay; proxy_pass http://gardenops; }

    location / {
        proxy_pass http://gardenops;
    }
}
