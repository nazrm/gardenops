# vim:ft=nginx
#
# Production-oriented GardenOps reverse proxy template. Replace
# gardenops.example.com and TLS paths before use.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

map $request_uri $gardenops_log_uri {
    default $request_uri;
    ~^/calendar/subscriptions/[^/?]+\.ics(?:\?.*)?$ /calendar/subscriptions/[redacted].ics;
    ~^/shademap/terrain/ $uri?[redacted];
}

log_format gardenops_redacted '$remote_addr - $remote_user [$time_local] '
    '"$request_method $gardenops_log_uri $server_protocol" $status $body_bytes_sent '
    '"$http_referer" "$http_user_agent"';

limit_req_zone $binary_remote_addr zone=gardenops_auth:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=gardenops_admin_read:10m rate=12r/m;
limit_req_zone $binary_remote_addr zone=gardenops_admin_write:10m rate=6r/m;
limit_req_zone $binary_remote_addr zone=gardenops_ai:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=gardenops_upload:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=gardenops_features:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=gardenops_terrain:10m rate=8r/s;

server {
    listen 80;
    listen [::]:80;
    server_name gardenops.example.com;

    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html/gardenops.example.com/;
    }

    location / {
        return 301 https://gardenops.example.com$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name gardenops.example.com;

    ssl_certificate /etc/letsencrypt/live/gardenops.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gardenops.example.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    ssl_stapling on;
    ssl_stapling_verify on;

    server_tokens off;

    add_header Referrer-Policy                   "no-referrer"       always;
    add_header X-Content-Type-Options            "nosniff"           always;
    add_header X-Permitted-Cross-Domain-Policies "none"              always;
    add_header X-Robots-Tag                      "noindex, nofollow" always;
    add_header Strict-Transport-Security         "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options                   "SAMEORIGIN"        always;
    add_header Permissions-Policy                "camera=(), microphone=(), geolocation=(), payment=()" always;

    access_log /var/log/nginx/gardenops-access.log gardenops_redacted;
    error_log  /var/log/nginx/gardenops-error.log error;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;

    proxy_buffering off;
    proxy_request_buffering off;
    limit_req_status 429;

    location ^~ /api/admin/ {
        limit_req zone=gardenops_admin_read burst=12 nodelay;
        client_max_body_size 1m;
        proxy_pass http://127.0.0.1:8000;
    }

    location = /api/snapshots {
        limit_req zone=gardenops_admin_write burst=6 nodelay;
        client_max_body_size 1m;
        proxy_pass http://127.0.0.1:8000;
    }

    location ^~ /api/snapshots/ {
        limit_req zone=gardenops_admin_write burst=6 nodelay;
        client_max_body_size 1m;
        proxy_pass http://127.0.0.1:8000;
    }

    location = /api/plots/import {
        limit_req zone=gardenops_admin_write burst=6 nodelay;
        client_max_body_size 8m;
        proxy_pass http://127.0.0.1:8000;
    }

    location = /api/plants/import-csv {
        limit_req zone=gardenops_upload burst=4 nodelay;
        client_max_body_size 8m;
        proxy_pass http://127.0.0.1:8000;
    }

    location = /api/media/upload {
        limit_req zone=gardenops_upload burst=4 nodelay;
        client_max_body_size 8m;
        proxy_pass http://127.0.0.1:8000;
    }

    location ^~ /api/auth/ {
        limit_req zone=gardenops_auth burst=20 nodelay;
        client_max_body_size 1m;
        proxy_pass http://127.0.0.1:8000;
    }

    location = /api/ai/identify-plant {
        limit_req zone=gardenops_ai burst=10 nodelay;
        client_max_body_size 8m;
        proxy_pass http://127.0.0.1:8000;
    }

    location = /api/ai/diagnose-plant {
        limit_req zone=gardenops_ai burst=10 nodelay;
        client_max_body_size 8m;
        proxy_pass http://127.0.0.1:8000;
    }

    location ^~ /api/ai/ {
        limit_req zone=gardenops_ai burst=10 nodelay;
        client_max_body_size 1m;
        proxy_pass http://127.0.0.1:8000;
    }

    location = /api/shademap/features {
        limit_req zone=gardenops_features burst=30 nodelay;
        client_max_body_size 1m;
        proxy_pass http://127.0.0.1:8000;
    }

    location ^~ /shademap/terrain/ {
        limit_req zone=gardenops_terrain burst=120 nodelay;
        client_max_body_size 1m;
        proxy_pass http://127.0.0.1:8000;
    }

    location / {
        client_max_body_size 1m;
        proxy_pass http://127.0.0.1:8000;
    }
}
